{% extends "base.html" %}

{% block content %}
<div class="container py-5 mt-3">
  <div class="auth-glass-card">

    <!-- Header -->
    <div class="text-center mb-4">
      <div class="logo-icon mx-auto mb-3" style="width:56px;height:56px;border-radius:14px;">
        <i class="fa-solid fa-lock" style="color:var(--purple);font-size:1.3rem;"></i>
      </div>
      <h1 style="font-size:1.8rem;font-weight:800;letter-spacing:-.5px;color:#fff;margin-bottom:6px;">Welcome back</h1>
      <p style="color:var(--muted);font-size:.9rem;">Sign in to your account to continue</p>
    </div>

    <form id="loginForm" method="POST" action="{{ url_for('login') }}" novalidate>

      <div class="input-sk-group mb-4">
        <label for="loginEmail">Email address</label>
        <input type="email" class="form-control" id="loginEmail" name="email"
               placeholder="you@example.com" autocomplete="email" required>
      </div>

      <div class="input-sk-group mb-4">
        <label for="loginPassword">Password</label>
        <input type="password" class="form-control" id="loginPassword" name="password"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn-sk-primary w-100 mb-4" style="padding:14px 28px;justify-content:center;font-size:1rem;">
        Sign In →
      </button>

    </form>

    <p class="text-center" style="color:var(--muted);font-size:.9rem;">
      Don't have an account?&nbsp;
      <a href="{{ url_for('signup') }}" style="color:var(--purple);font-weight:600;text-decoration:none;">Sign up for free</a>
    </p>
    <p class="text-center mt-2">
      <a href="{{ url_for('dashboard') }}" style="color:var(--muted2);font-size:.85rem;text-decoration:none;">
        ← Back to Browse
      </a>
    </p>

  </div>
</div>
{% endblock %}
