{% extends "base.html" %}

{% block content %}
<div class="container py-5 mt-3">
  <div class="auth-glass-card" style="max-width:560px;">

    <!-- Header -->
    <div class="text-center mb-4">
      <div class="logo-icon mx-auto mb-3" style="width:56px;height:56px;border-radius:14px;">
        <i class="fa-solid fa-user-plus" style="color:var(--purple);font-size:1.3rem;"></i>
      </div>
      <h1 style="font-size:1.8rem;font-weight:800;letter-spacing:-.5px;color:#fff;margin-bottom:6px;">Create account</h1>
      <p style="color:var(--muted);font-size:.9rem;">Join the Lost &amp; Found community today</p>
    </div>

    <form id="signupForm" method="POST" action="{{ url_for('signup') }}" novalidate>

      <div class="input-sk-group mb-4">
        <label for="signupName">Full Name</label>
        <input type="text" class="form-control" id="signupName" name="name"
               placeholder="Your full name" autocomplete="name" required>
      </div>

      <div class="input-sk-group mb-4">
        <label for="signupEmail">Email address</label>
        <input type="email" class="form-control" id="signupEmail" name="email"
               placeholder="you@example.com" autocomplete="email" required>
      </div>

      <div class="input-sk-group mb-4">
        <label for="signupPassword">Password</label>
        <input type="password" class="form-control" id="signupPassword" name="password"
               placeholder="Min. 6 characters" autocomplete="new-password" required>
      </div>

      <div class="input-sk-group mb-4">
        <label for="signupConfirm">Confirm Password</label>
        <input type="password" class="form-control" id="signupConfirm" name="confirm_password"
               placeholder="Repeat your password" autocomplete="new-password" required>
      </div>

      <button type="submit" class="btn-sk-primary w-100 mb-4" style="padding:14px 28px;justify-content:center;font-size:1rem;">
        Create Account →
      </button>

    </form>

    <p class="text-center" style="color:var(--muted);font-size:.9rem;">
      Already have an account?&nbsp;
      <a href="{{ url_for('login') }}" style="color:var(--purple);font-weight:600;text-decoration:none;">Sign in</a>
    </p>

  </div>
</div>
{% endblock %}
